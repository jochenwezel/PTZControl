name: Build and Release PTZControl

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-x64:
    runs-on: windows-2025-vs2026
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild path
      uses: microsoft/setup-msbuild@v2
      with:
        vs-version: '[18.0,19.0)'

    - name: Restore NuGet packages
      run: nuget restore PTZControl/PTZControl.sln

    - name: Build the PTZControl project (x64)
      run: msbuild PTZControl/PTZControl.sln /p:Configuration=Release /p:Platform=x64

    - name: Publish PTZControlConsole (x64)
      run: dotnet publish PTZControlConsole/PTZControlConsole.csproj -c Release -r win-x64 --self-contained false -o ${{ github.workspace }}\console-win-x64

    - name: Upload PTZControl (x64) as artifact
      uses: actions/upload-artifact@v4
      with:
        name: PTZControl-x64
        path: ${{ github.workspace }}\PTZControl\x64\Release\PTZControl.exe

    - name: Upload PTZControlConsole (x64) as artifact
      uses: actions/upload-artifact@v4
      with:
        name: PTZControlConsole-win-x64
        path: ${{ github.workspace }}\console-win-x64\*

  build-x86:
    runs-on: windows-2025-vs2026
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild path
      uses: microsoft/setup-msbuild@v2
      with:
        vs-version: '[18.0,19.0)'

    - name: Restore NuGet packages
      run: nuget restore PTZControl/PTZControl.sln

    - name: Build the PTZControl project (x86)
      run: msbuild PTZControl/PTZControl.sln /p:Configuration=Release /p:Platform=x86

    - name: Publish PTZControlConsole (x86)
      run: dotnet publish PTZControlConsole/PTZControlConsole.csproj -c Release -r win-x86 --self-contained false -o ${{ github.workspace }}\console-win-x86

    - name: Upload PTZControl (x86) as artifact
      uses: actions/upload-artifact@v4
      with:
        name: PTZControl-x86
        path: ${{ github.workspace }}\PTZControl\Release\PTZControl.exe

    - name: Upload PTZControlConsole (x86) as artifact
      uses: actions/upload-artifact@v4
      with:
        name: PTZControlConsole-win-x86
        path: ${{ github.workspace }}\console-win-x86\*

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish PTZControlConsole (linux-x64 beta)
      run: dotnet publish PTZControlConsole/PTZControlConsole.csproj -c Release -r linux-x64 --self-contained false -o "${{ github.workspace }}/console-linux-x64"

    - name: Upload PTZControlConsole (linux-x64 beta) as artifact
      uses: actions/upload-artifact@v4
      with:
        name: PTZControlConsole-linux-x64-beta
        path: ${{ github.workspace }}/console-linux-x64/*

  create-release:
    needs: [build-x64, build-x86, build-linux-x64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
  
      - name: Extract Tag Name
        id: tagname
        run: |
          echo "TAG_NAME=$(echo ${{ github.ref }} | sed 's/refs\/tags\///')" >> $GITHUB_ENV
          echo "VERSION=$(echo ${{ github.ref }} | sed 's/refs\/tags\/v//')" >> $GITHUB_ENV
          if echo "${{ github.ref }}" | grep -Eq '^refs/tags/v2\.4\.2\.'; then
            echo "IS_PREVIEW_RELEASE=true" >> $GITHUB_ENV
          else
            echo "IS_PREVIEW_RELEASE=false" >> $GITHUB_ENV
          fi
  
      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: PTZControl-x64
          path: PTZControl-win-x64
  
      - name: Download x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: PTZControl-x86
          path: PTZControl-win-x86

      - name: Download console x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: PTZControlConsole-win-x64
          path: PTZControlConsole-${{ env.TAG_NAME }}-win-x64

      - name: Download console x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: PTZControlConsole-win-x86
          path: PTZControlConsole-${{ env.TAG_NAME }}-win-x86

      - name: Download console linux x64 beta artifact
        uses: actions/download-artifact@v4
        with:
          name: PTZControlConsole-linux-x64-beta
          path: PTZControlConsole-${{ env.TAG_NAME }}-linux-x64-beta

      - name: Add console helper files
        run: |
          mkdir -p PTZControlConsole-${{ env.TAG_NAME }}-win-x64/scripts
          mkdir -p PTZControlConsole-${{ env.TAG_NAME }}-win-x86/scripts
          mkdir -p PTZControlConsole-${{ env.TAG_NAME }}-linux-x64-beta/scripts
          cp scripts/test-console-camera-windows.ps1 PTZControlConsole-${{ env.TAG_NAME }}-win-x64/scripts/
          cp scripts/test-console-camera-windows.ps1 PTZControlConsole-${{ env.TAG_NAME }}-win-x86/scripts/
          cp scripts/test-console-camera-linux.sh PTZControlConsole-${{ env.TAG_NAME }}-linux-x64-beta/scripts/
          chmod +x PTZControlConsole-${{ env.TAG_NAME }}-linux-x64-beta/scripts/test-console-camera-linux.sh
          cp install-linux.md PTZControlConsole-${{ env.TAG_NAME }}-linux-x64-beta/
  
      - name: Package Files
        run: |
          (cd PTZControl-win-x64 && zip -r ../PTZControl-win-x64.zip .)
          (cd PTZControl-win-x86 && zip -r ../PTZControl-win-x86.zip .)
          (cd PTZControlConsole-${{ env.TAG_NAME }}-win-x64 && zip -r ../PTZControlConsole-win-x64.zip .)
          (cd PTZControlConsole-${{ env.TAG_NAME }}-win-x86 && zip -r ../PTZControlConsole-win-x86.zip .)
          tar -czf PTZControlConsole-linux-x64-beta.tar.gz PTZControlConsole-${{ env.TAG_NAME }}-linux-x64-beta
  
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: PTZControl.exe ${{ env.VERSION }}
          prerelease: ${{ env.IS_PREVIEW_RELEASE == 'true' }}
          files: |
            ./PTZControl-win-x64.zip
            ./PTZControl-win-x86.zip
            ./PTZControlConsole-win-x64.zip
            ./PTZControlConsole-win-x86.zip
            ./PTZControlConsole-linux-x64-beta.tar.gz
      
